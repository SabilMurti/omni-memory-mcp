<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni Memory Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --primary: #3b82f6;
      --danger: #ef4444;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      background-color: var(--card);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .badge {
      background: var(--primary);
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    main {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }
    .grid {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 2rem;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem;
      border-radius: 6px;
      box-sizing: border-box;
      font-family: inherit;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    .memory-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .memory-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      position: relative;
    }
    .memory-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
    .memory-type {
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
    }
    .memory-scope {
      color: var(--text-muted);
    }
    .memory-content {
      line-height: 1.5;
    }
    .delete-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      color: var(--danger);
      width: auto;
      padding: 0;
      font-size: 0.85rem;
    }
    .delete-btn:hover {
      text-decoration: underline;
    }
    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Omni Memory</h1>
    <span class="badge">Single Source of Truth</span>
  </header>

  <main>
    <div class="grid">
      <!-- Form Panel -->
      <div class="panel">
        <h2 style="margin-top:0;">Add Memory</h2>
        <form id="addForm">
          <div class="form-group">
            <label>Type</label>
            <select id="type" required>
              <option value="user">User</option>
              <option value="preference">Preference</option>
              <option value="project">Project</option>
              <option value="workflow">Workflow</option>
            </select>
          </div>
          <div class="form-group">
            <label>Scope (e.g. global, pormulir)</label>
            <input type="text" id="scope" value="global" required />
          </div>
          <div class="form-group">
            <label>Content</label>
            <textarea id="content" placeholder="E.g. Sabil prefers clean layouts without animations." required></textarea>
          </div>
          <button type="submit">Save Memory</button>
        </form>
      </div>

      <!-- List Panel -->
      <div class="panel">
        <div class="filters">
          <input type="text" id="searchInput" placeholder="Search memories..." />
          <select id="filterType">
            <option value="">All Types</option>
            <option value="user">User</option>
            <option value="preference">Preference</option>
            <option value="project">Project</option>
            <option value="workflow">Workflow</option>
          </select>
        </div>
        
        <div class="memory-list" id="memoryList">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/src/dashboard/main.ts"></script>
</body>
</html>
